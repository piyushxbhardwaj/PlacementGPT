version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: placementgpt-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: placementgpt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - placement-network

  redis:
    image: redis:7-alpine
    container_name: placementgpt-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - placement-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placementgpt-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/placementgpt
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=placementgpt
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=supersecretjwtkeyforplacementgptdevelopment123!
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=120
      - FIRST_ADMIN_EMAIL=admin@placementgpt.com
      - FIRST_ADMIN_PASSWORD=AdminSecurePass123!
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENV=production
      - PORT=8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend-cache:/root/.cache
    networks:
      - placement-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: placementgpt-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - placement-network

  prometheus:
    image: prom/prometheus:latest
    container_name: placementgpt-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - placement-network
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  backend-cache:
  
networks:
  placement-network:
    driver: bridge
